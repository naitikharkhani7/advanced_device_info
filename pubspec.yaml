name: advanced_device_info
description: "A Flutter plugin for comprehensive Android and iOS device information."
version: 0.0.1
homepage: https://github.com/naitikharkhani7/advanced_device_info
repository: https://github.com/naitikharkhani7/advanced_device_info

environment:
  sdk: ^3.12.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
flutter:

  plugin:
    platforms:
      android:
        package: com.naitikharkhani.advanced_device_info
        pluginClass: AdvancedDeviceInfoPlugin
      ios:
        pluginClass: AdvancedDeviceInfoPlugin
